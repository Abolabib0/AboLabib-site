<!DOCTYPE html>
<html lang='ar' dir='ltr'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #051329 0%, #000000 100%);
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  #ai-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0; 
  }

  .container {
    width: 100%;
    max-width: 450px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    z-index: 1; 
    pointer-events: none;
  }

  .container > * {
    pointer-events: auto;
  }

  .logo {
    position: relative;
  }

  .logo img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    object-position: top; /* السطر ده هو اللي هيظبط الصورة ويجيب وشك بالكامل */
    border-radius: 50%;
    border: 2px solid rgba(200, 220, 255, 0.6);
    box-shadow: 0 0 25px rgba(100, 150, 255, 0.3);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .logo img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 45px rgba(150, 190, 255, 0.7);
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .links a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 15px;
    text-decoration: none;
    color: #c8d8ff;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(150, 190, 255, 0.2);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-weight: 600;
    font-size: 16px;
    transition: all 0.4s ease;
    box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
  }

  .links a i {
    font-size: 20px;
  }

  .links a:hover {
    background: rgba(150, 190, 255, 0.15);
    color: #ffffff;
    border-color: rgba(150, 190, 255, 0.8);
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(100, 150, 255, 0.3), inset 0 0 15px rgba(200, 220, 255, 0.1);
  }

  .qrcode img {
    border-radius: 15px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 20px rgba(100, 150, 255, 0.15);
    width: 140px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  .qrcode img:hover {
    transform: scale(1.15) rotate(2deg);
    box-shadow: 0 0 30px rgba(150, 190, 255, 0.4);
  }

  footer {
    margin-top: 20px;
    color: rgba(150, 190, 255, 0.7);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="ai-canvas"></canvas>

<div class="container">
  <div class='logo'>
    <img src='logo.jpg' alt='Eng. Zeyad Labib Logo'>
  </div>

  <div class='links'>
    <a href='https://wa.me/201550591333' target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp 1</a>
    <a href='https://wa.me/201029424424' target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp 2</a>
    <a href='https://t.me/+201550591333' target="_blank"><i class="fab fa-telegram-plane"></i> Telegram</a>
    <a href='https://www.facebook.com/cc.zeyad/' target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
    <a href='https://www.instagram.com/abo_l7bib/' target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
  </div>



  <footer>By Eng . Zeyad Labib</footer>
</div>

<script>
  const canvas = document.getElementById('ai-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, particles;
  
  let mouse = { x: null, y: null };

  window.addEventListener('mousemove', (event) => {
    mouse.x = event.x;
    mouse.y = event.y;
  });
  window.addEventListener('mouseout', () => {
    mouse.x = null;
    mouse.y = null;
  });
  window.addEventListener('touchmove', (event) => {
    mouse.x = event.touches[0].clientX;
    mouse.y = event.touches[0].clientY;
  });
  window.addEventListener('touchend', () => {
    mouse.x = null;
    mouse.y = null;
  });

  function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    particles = [];
    
    let particleCount = width < 600 ? 120 : 250; 

    for (let i = 0; i < particleCount; i++) {
      let size = Math.random();
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        radius: size * 2.5 + 0.5, 
        baseRadius: size * 2.5 + 0.5,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);
    
    for (let i = 0; i < particles.length; i++) {
      let p = particles[i];
      
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > width) p.vx *= -1;
      if (p.y < 0 || p.y > height) p.vy *= -1;

      p.pulse += 0.05;
      p.radius = p.baseRadius + Math.sin(p.pulse) * 0.5;

      ctx.beginPath();
      ctx.fillStyle = `rgba(200, 220, 255, ${p.radius/3})`; 
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();

      if (mouse.x != null && mouse.y != null) {
        let dx = mouse.x - p.x;
        let dy = mouse.y - p.y;
        let distMouse = Math.sqrt(dx*dx + dy*dy);
        
        if (distMouse < 220) {
          p.x += dx * 0.015;
          p.y += dy * 0.015;

          ctx.beginPath();
          ctx.strokeStyle = `rgba(150, 190, 255, ${1 - distMouse/220})`;
          ctx.lineWidth = (1 - distMouse/220) * 2.5; 
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.stroke();
        }
      }

      for (let j = i + 1; j < particles.length; j++) {
        let p2 = particles[j];
        let dx2 = p.x - p2.x;
        let dy2 = p.y - p2.y;
        let dist = Math.sqrt(dx2*dx2 + dy2*dy2);
        
        if (dist < 110) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(150, 180, 255, ${0.3 - dist/360})`; 
          ctx.lineWidth = 0.8;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
</script>

</body>
</html>
